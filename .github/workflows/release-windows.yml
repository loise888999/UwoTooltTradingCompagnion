name: Release Windows App

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (example: v1.0.0)"
        required: true
      backend_entry:
        description: "Backend startup file path relative to published backend"
        required: false
        default: "OcrTradingBackend.exe"
      frontend_url:
        description: "Optional URL to load in Electron instead of bundled backend URL"
        required: false
        default: ""

env:
  OCR_BACKEND_REPO: https://github.com/loise888999/OcrTradingBackend
  OCR_BACKEND_REF: main
  FRONTEND_REPO: https://github.com/loise888999/OcrTradingFrontend
  FRONTEND_REF: main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout shell repo
        uses: actions/checkout@v4

      - name: Validate release tag format
        shell: bash
        run: |
          if [[ ! "${{ github.event.inputs.release_tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "release_tag must match semver format like v1.2.3"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Clone OCR backend repo
        shell: bash
        env:
          REPO_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          node scripts/clone-repo.js "$OCR_BACKEND_REPO" "$OCR_BACKEND_REF" "external/ocr-backend"

      - name: Clone frontend repo
        shell: bash
        env:
          REPO_TOKEN: ${{ secrets.EXTERNAL_REPO_TOKEN }}
        run: |
          node scripts/clone-repo.js "$FRONTEND_REPO" "$FRONTEND_REF" "external/frontend"

      - name: Install app dependencies
        run: npm ci

      - name: Apply release version to app metadata
        shell: bash
        run: |
          APP_VERSION="${{ github.event.inputs.release_tag }}"
          npm version "${APP_VERSION#v}" --no-git-tag-version

      - name: Publish OCR backend
        shell: bash
        run: |
          dotnet publish external/ocr-backend/OcrTradingBackend.csproj \
            -c Release \
            -r win-x64 \
            --self-contained false \
            -o external/ocr-backend-publish

      - name: Build frontend
        shell: bash
        env:
          VITE_API_BASE_URL: http://127.0.0.1:5000
        run: |
          cd external/frontend
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi
          npm run build

      - name: Prepare bundle from external repos
        shell: bash
        env:
          OCR_BACKEND_ENTRY_REL: ${{ github.event.inputs.backend_entry }}
          FRONTEND_URL: ${{ github.event.inputs.frontend_url }}
        run: node scripts/prepare-bundle.js

      - name: Verify bundle layout
        shell: bash
        run: node scripts/verify-bundle.js

      - name: Build portable Windows app
        run: npm run build:win

      - name: List release files
        shell: bash
        run: ls -la dist/*.exe

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag }}
          name: ${{ github.event.inputs.release_tag }}
          generate_release_notes: true
          files: |
            dist/*.exe
